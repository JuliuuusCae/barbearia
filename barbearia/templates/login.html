<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Barbearia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="bg-dark d-flex flex-column min-vh-100">

    <header class="header">
        <div class="header__inner">
            <h1 class="header__logo">Barbearia</h1>
            <nav class="header__nav">
                <a href="{{ url_for('index') }}" class="header__admin-link">Voltar</a>
            </nav>
        </div>
    </header>

    <main class="container mt-5 flex-grow-1 d-flex align-items-center justify-content-center">
        <div class="card p-4 bg-light text-dark" style="max-width: 400px; width: 100%;">
            <h2 class="card-title text-center mb-4">Login do Barbeiro</h2>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <div class="flash-messages mb-3">
                {% for category, message in messages %}
                <div class="alert alert-{{ category }}" role="alert">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}">
                <div class="mb-3">
                    <label for="usuario" class="form-label">Usuário</label>
                    <input type="text" class="form-control" id="usuario" name="usuario" placeholder="Digite seu usuário" required>
                </div>
                <div class="mb-3">
                    <label for="senha" class="form-label">Senha</label>
                    <input type="password" class="form-control" id="senha" name="senha" placeholder="Digite sua senha" required>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-warning">Entrar</button>
                </div>
            </form>
        </div>
    </main>

    <script src="/static/script.js"></script>
</body>

</html>
